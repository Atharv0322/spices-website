<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout - Atharv Masala Stores</title>

    <link rel="stylesheet" href="style.css">

    <!-- EMAILJS -->

    <script
        type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>

    <script>

        emailjs.init("S4GQIV5XISqsaiU7w");

    </script>

</head>

<body>

<!-- TOAST -->

<div id="toast"></div>

<!-- NAVBAR -->

<nav class="navbar">

    <div class="nav-left">

        <a href="index.html">Home</a>

        <a href="products.html">Products</a>

        <a href="about.html">About</a>

    </div>

    <div class="logo-center">

        <span class="logo-icon">🌶️</span>

        <span class="logo-text">

            Atharv Masala

        </span>

    </div>

    <div class="nav-right">

        <a href="cart.html">
            Cart (<span id="cart-count">0</span>)
        </a>

        <a href="track-order.html">
            Track Order
        </a>

        <a href="login.html">
            Admin
        </a>

    </div>

</nav>

<!-- HERO -->

<section class="hero-small">

    <div class="hero-content">

        <h1>

            💳 Secure Checkout

        </h1>

        <p>

            Fast • Secure • Trusted Payments

        </p>

    </div>

</section>

<!-- CHECKOUT -->

<section class="products-section">

    <div class="checkout-box">

        <h2>

            Customer Details

        </h2>

        <input
            type="text"
            id="name"
            placeholder="Full Name"
        >

        <input
            type="email"
            id="email"
            placeholder="Email Address"
        >

        <input
            type="text"
            id="phone"
            placeholder="Phone Number"
            maxlength="10"
        >

        <textarea
            id="address"
            placeholder="Delivery Address"
        ></textarea>

        <!-- SUMMARY -->

        <div
            class="summary"
            id="summary"
        >

        </div>

        <h2 style="margin-top:30px;">

            Select Payment Method

        </h2>

        <!-- PAYMENT -->

        <div class="payment-box">

            <label class="payment-option">

                <input
                    type="radio"
                    name="payment"
                    value="UPI"
                >

                <span>

                    📱 UPI Payment

                </span>

            </label>

            <label class="payment-option">

                <input
                    type="radio"
                    name="payment"
                    value="Credit Card"
                >

                <span>

                    💳 Credit / Debit Card

                </span>

            </label>

            <label class="payment-option">

                <input
                    type="radio"
                    name="payment"
                    value="Net Banking"
                >

                <span>

                    🏦 Net Banking

                </span>

            </label>

            <label class="payment-option">

                <input
                    type="radio"
                    name="payment"
                    value="Cash on Delivery"
                >

                <span>

                    💵 Cash On Delivery

                </span>

            </label>

        </div>

        <!-- BUTTON -->

        <button
            id="placeBtn"
            onclick="placeOrder()"
        >

            Place Order 🚀

        </button>

    </div>

</section>

<script>

/* GET CART */

function getCart(){

    return JSON.parse(

        localStorage.getItem("cart")

    ) || [];

}

/* UPDATE CART COUNT */

function updateCartCount(){

    const cart = getCart();

    let count = 0;

    cart.forEach(item => {

        count += item.quantity;

    });

    document.getElementById("cart-count")
        .innerText = count;

}

/* LOAD SUMMARY */

function loadSummary(){

    const cart = getCart();

    const summary =
        document.getElementById("summary");

    let total = 0;

    if(cart.length === 0){

        summary.innerHTML = `

            <h2>

                ❌ Your Cart Is Empty

            </h2>

        `;

        return;

    }

    summary.innerHTML = `

        <h3>

            🛒 Order Summary

        </h3>

    `;

    cart.forEach(item => {

        total +=
            item.price * item.quantity;

        summary.innerHTML += `

            <p>

                ${item.name}
                × ${item.quantity}

                = ₹${item.price * item.quantity}

            </p>

        `;

    });

    summary.innerHTML += `

        <hr>

        <h2>

            Total: ₹${total}

        </h2>

    `;

}

/* EMAIL VALIDATION */

function validateEmail(email){

    const regex =
        /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    return regex.test(email);

}

/* PHONE VALIDATION */

function validatePhone(phone){

    return /^[0-9]{10}$/.test(phone);

}

/* PLACE ORDER */

async function placeOrder(){

    const name =
        document.getElementById("name").value.trim();

    const email =
        document.getElementById("email").value.trim();

    const phone =
        document.getElementById("phone").value.trim();

    const address =
        document.getElementById("address").value.trim();

    const payment =
        document.querySelector(
            'input[name="payment"]:checked'
        )?.value;

    const cart = getCart();

    /* EMPTY CART */

    if(cart.length === 0){

        alert("❌ Your cart is empty");

        return;

    }

    /* NAME */

    if(name.length < 3){

        alert("❌ Enter valid full name");

        return;

    }

    /* EMAIL */

    if(!validateEmail(email)){

        alert("❌ Enter valid email address");

        return;

    }

    /* PHONE */

    if(!validatePhone(phone)){

        alert("❌ Phone number must be 10 digits");

        return;

    }

    /* ADDRESS */

    if(address.length < 10){

        alert("❌ Enter complete delivery address");

        return;

    }

    /* PAYMENT */

    if(!payment){

        alert("❌ Select payment method");

        return;

    }

    /* DISABLE BUTTON */

    const btn =
        document.getElementById("placeBtn");

    btn.disabled = true;

    btn.innerText = "Processing...";

    let total = 0;

    cart.forEach(item => {

        total +=
            item.price * item.quantity;

    });

    /* ORDER ID */

    const orderId =
        "ORD" +
        Math.floor(
            100000 + Math.random() * 900000
        );

    /* ORDER DATA */

    const orderData = {

        orderId:orderId,

        customerName:name,

        email:email,

        phone:phone,

        address:address,

        paymentMethod:payment,

        items:cart,

        total:total,

        status:"Order Placed",

        date:new Date()

    };

    try{

        const res = await fetch(

            "/place-order",

            {

                method:"POST",

                headers:{

                    "Content-Type":
                        "application/json"

                },

                body: JSON.stringify(orderData)

            }

        );

        const data = await res.json();

        if(data.success){

            /* SEND EMAIL */

            emailjs.send(

                "service_7r67ga6",

                "template_sekxhzc",

                {

                    customer_name:name,

                    order_id:orderId,

                    email:email,

                    track_link:
                    `https://spices-website-ynf3.onrender.com/track-order.html?orderId=${orderId}`

                }

            )

            .then(()=>{

                console.log(
                    "✅ Email Sent"
                );

            })

            .catch((error)=>{

                console.log(
                    "❌ Email Error",
                    error
                );

            });

         alert(

`🎉 Order Placed Successfully!

Order ID: ${orderId}

Please wait...
Sending confirmation email.`

);

localStorage.removeItem("cart");

/* WAIT BEFORE REDIRECT */

setTimeout(()=>{

    window.location.href =
        "index.html";

}, 5000);

        }
        else{

            alert(
                "❌ Failed To Place Order"
            );

        }

    }
    catch(err){

        console.log(err);

        alert(
            "❌ Server Error"
        );

    }

    btn.disabled = false;

    btn.innerText = "Place Order 🚀";

}

/* INITIAL LOAD */

loadSummary();

updateCartCount();

</script>

</body>

</html>
