<!DOCTYPE html>
<html>

<head>

    <title>Admin Products - Atharv Masala</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body {

    margin: 0;

    font-family: 'Poppins', sans-serif;

    background: #0f0f0f;

    color: white;

}

.container {

    width: 90%;

    max-width: 700px;

    margin: 120px auto;

}

h1 {

    text-align: center;

    margin-bottom: 40px;

    font-size: 50px;

}

.form-box {

    background:
        rgba(255,255,255,0.05);

    border:
        1px solid rgba(255,255,255,0.08);

    border-radius: 30px;

    padding: 40px;

    backdrop-filter: blur(10px);

}

input,
textarea {

    width: 100%;

    margin-top: 20px;

    padding: 18px;

    border-radius: 15px;

    border: none;

    background:
        rgba(255,255,255,0.08);

    color: white;

    font-size: 16px;

    box-sizing: border-box;

}

textarea {

    height: 120px;

    resize: none;

}

button {

    width: 100%;

    margin-top: 25px;

    padding: 18px;

    border: none;

    border-radius: 16px;

    background:
        linear-gradient(
            45deg,
            #ff9800,
            #ff5722
        );

    color: white;

    font-size: 18px;

    font-weight: 600;

    cursor: pointer;

}

button:hover {

    opacity: 0.9;

}

</style>

</head>

<body>

<div class="container">

    <h1>

        🌶️ Add New Product

    </h1>

    <div class="form-box">

        <input
            type="text"
            id="name"
            placeholder="Product Name"
        >

        <textarea
            id="description"
            placeholder="Product Description"
        ></textarea>

        <input
            type="number"
            id="price"
            placeholder="Price"
        >

        <input
            type="text"
            id="image"
            placeholder="Image URL"
        >

        <input
            type="text"
            id="badge"
            placeholder="Badge (HOT 🔥)"
        >

        <button onclick="addProduct()">

            Add Product 🚀

        </button>

    </div>

</div>

<script>

async function addProduct() {

    const product = {

        name:
            document.getElementById("name").value,

        description:
            document.getElementById("description").value,

        price:
            document.getElementById("price").value,

        image:
            document.getElementById("image").value,

        badge:
            document.getElementById("badge").value

    };

    await fetch("/add-product", {

        method: "POST",

        headers: {

            "Content-Type": "application/json"

        },

        body: JSON.stringify(product)

    });

    alert("✅ Product Added");

    location.reload();

}

</script>

</body>

</html>
